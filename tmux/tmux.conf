# ── Terminal & Basics ───────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"   # true color
set -s escape-time 10                              # reduce Esc delay (important for nvim)
set -g focus-events on                             # let nvim detect focus events
set -g history-limit 50000
set -g mouse off                                    # mouse support

unbind C-b
set -g prefix 'C-]'

# ── Window & Pane index starts at 1 ────────────────────────────
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

# ── Split panes (intuitive: | vertical, - horizontal) ──────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"   # new window inherits current path

# ── Pane navigation (vim-style) ────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (shift + vim direction keys)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode (vi) ──────────────────────────────────────────
set-window-option -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi r send-keys -X rectangle-toggle

bind R source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"
bind x kill-pane
bind X kill-window
bind q display-panes

set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# ── Status Left: session name ────────────────────────────────────
set -g status-left-length 40
set -g status-left "#[bg=#89b4fa,fg=#11111b,bold] #S #[bg=#1e1e2e,fg=#89b4fa,nobold] "

# ── Status Right: claude usage → time ───────────────────────────
set -g status-right-length 100
set -g status-right "#[fg=#45475a,bg=#1e1e2e]#[fg=#fab387,bg=#45475a,bold] Claude: #(~/.config/tmux/tmux-status/ccusage-today.sh) #[fg=#45475a,bg=#1e1e2e] #[fg=#89b4fa,bg=#1e1e2e]#[fg=#1e1e2e,bg=#89b4fa,bold] %H:%M #[fg=#89b4fa,bg=#1e1e2e]"

# ── Window status ────────────────────────────────────────────────
setw -g window-status-format "#[fg=#45475a,bg=#1e1e2e]#[fg=#a6adc8,bg=#45475a] #W#(~/.config/tmux/tmux-status/window-task-icon.sh '#{window_id}' '#{@unread}' '#{@watching}') #[fg=#45475a,bg=#1e1e2e] "
setw -g window-status-current-format "#[fg=#89b4fa,bg=#1e1e2e]#[fg=#1e1e2e,bg=#89b4fa,bold] #W#(~/.config/tmux/tmux-status/window-task-icon.sh '#{window_id}' '#{@unread}' '#{@watching}') #[fg=#89b4fa,bg=#1e1e2e,nobold] "
set -g window-status-separator " "

# ── Other ───────────────────────────────────────────────────────
set -g display-time 2000
set -g display-panes-time 2000
set -g automatic-rename on
