# ── Terminal & Basics ───────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"   # true color
set -s escape-time 10                              # reduce Esc delay (important for nvim)
set -g focus-events on                             # let nvim detect focus events
set -g history-limit 50000
set -g mouse off                                    # mouse support

unbind C-b
set -g prefix 'C-]'

# ── Window & Pane index starts at 1 ────────────────────────────
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

# ── Split panes (intuitive: | vertical, - horizontal) ──────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"   # new window inherits current path

# ── Pane navigation (vim-style) ────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (shift + vim direction keys)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode (vi) ──────────────────────────────────────────
set-window-option -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi r send-keys -X rectangle-toggle

bind R source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"
bind x kill-pane
bind X kill-window
bind q display-panes

set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

set -g status-left-length 40
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa]"

set -g status-right-length 60
set -g status-right "#[fg=green,bold]Claude: #(~/.config/tmux/tmux-status/ccusage-today.sh) #[fg=white]| #[fg=yellow]%H:%M "

setw -g window-status-format '#[fg=#c5c8c6] #W#(~/.config/tmux/tmux-status/window_task_icon.sh "#{window_id}" "#{@unread}" "#{@watching}") '
setw -g window-status-current-format '#[fg=#{@theme_color},bold] #W#(~/.config/tmux/tmux-status/window_task_icon.sh "#{window_id}" "#{@unread}" "#{@watching}") '
set -g window-status-separator ""

# ── Pane Borders ─────────────────────────────────────────────────
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# ── Other ───────────────────────────────────────────────────────
set -g display-time 2000
set -g display-panes-time 2000
set -g automatic-rename on
